<!DOCTYPE html>
<html>
<head>

    <title>FluxPark</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 bg-dark text-white min-vh-100">

            <h3 class="mt-3">FluxPark</h3>

            <hr>

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/dashboard">
                       Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/members">
                       Members
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/visitors">
                       Visitors
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/parking">
                       Parking
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/reports">
                       Reports
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"
                       href="/settings">
                       Settings
                    </a>
                </li>

            </ul>

        </div>

        <!-- Main Content -->

        <div class="col-md-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>
</html>
