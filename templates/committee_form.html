<!DOCTYPE html>
<html>
<head>
    <title>Committee Registration</title>
</head>
<body>

<h1>COMMITTEE</h1>

<form action="/save-committee" method="POST">

    <input type="text" name="head_name"
           placeholder="Committee Head">

    <br><br>

    <input type="text" name="phone"
           placeholder="Phone">

    <br><br>

    <input type="text" name="flat_no"
           placeholder="Flat No">

    <br><br>

    <input type="number"
           step="0.01"
           name="commission_percent"
           placeholder="Commission %">

    <br><br>

    <input type="text"
           name="bank_name"
           placeholder="Bank Name">

    <br><br>

    <input type="text"
           name="branch_name"
           placeholder="Branch Name">

    <br><br>

    <input type="text"
           name="ifsc_code"
           placeholder="IFSC Code">

    <br><br>

    <input type="text"
           name="account_number"
           placeholder="Account Number">

    <br><br>

    <button type="submit">
        Enter Room
    </button>

</form>

</body>
</html>
