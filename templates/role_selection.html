{% extends "base.html" %}
{% block title %}Select Your Role - FluxPark{% endblock %}

{% block content %}
  <h5 class="fw-semibold mb-1">{{ property.name }}</h5>
  <p class="text-muted">How will you be using FluxPark here?</p>

  <form method="POST">
    <div class="mb-4">
      <label for="role" class="form-label">Select your role</label>
      <select class="form-select form-select-lg" id="role" name="role" required>
        <option value="" selected disabled>Choose a role&hellip;</option>
        {% for value, label in roles %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <button type="submit" class="btn btn-brand btn-lg w-100">
      <i class="bi bi-arrow-right-circle me-1"></i> Continue
    </button>
  </form>
{% endblock %}
