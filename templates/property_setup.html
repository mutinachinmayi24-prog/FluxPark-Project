<!DOCTYPE html>
<html>
<head>
    <title>Create Property</title>
</head>
<body>

<h1>Create Property</h1>

<form action="/create-property" method="POST">

    <input
        type="text"
        name="property_name"
        placeholder="Property Name"
        required
    >

    <br><br>

    <select name="property_type">

        <option value="Apartment">Apartment</option>

        <option value="Gated Community">
            Gated Community
        </option>

        <option value="Office">Office</option>

    </select>

    <br><br>

    <textarea
        name="address"
        placeholder="Property Address"
        required
    ></textarea>

    <br><br>

    <input
        type="number"
        name="total_units"
        placeholder="Total Flats / Units"
        required
    >

    <br><br>

    <input
        type="number"
        name="extra_parking"
        placeholder="Extra Parking Spaces"
        value="0"
    >

    <br><br>

    <button type="submit">
        Create Property
    </button>

</form>

</body>
</html>
