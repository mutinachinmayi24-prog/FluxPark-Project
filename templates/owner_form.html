<!DOCTYPE html>
<html>
<head>
    <title>Owner Registration</title>
</head>
<body>

<h1>OWNER</h1>

<form action="/save-owner" method="POST">

    <input type="text" name="name" placeholder="Owner Name" required>

    <br><br>

    <input type="text" name="phone" placeholder="Phone Number" required>

    <br><br>

    <input type="text" name="flat_no" placeholder="Flat Number" required>

    <br><br>

    <input type="number" name="parking_slots" placeholder="Parking Slots">

    <br><br>

    <input type="text" name="parking_space_numbers"
           placeholder="Parking Space Numbers">

    <br><br>

    <button type="submit">
        Enter Room
    </button>

</form>

</body>
</html>
