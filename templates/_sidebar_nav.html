<a href="{{ url_for('dashboard') }}" class="d-flex align-items-center mb-3 text-white text-decoration-none">
  <i class="bi bi-p-circle-fill fs-3 me-2"></i>
  <span class="fs-4 fw-bold">FluxPark</span>
</a>
{% set lang_switcher_class = 'btn-outline-light' %}
<div class="mb-3">
  {% include '_language_switcher.html' %}
</div>
<hr class="text-white-50">
<ul class="nav nav-pills flex-column mb-auto gap-1">
  {% for item in nav_items %}
    <li class="nav-item">
      <a href="{{ url_for(item.endpoint) }}" class="nav-link text-white d-flex align-items-center justify-content-between {% if request.endpoint == item.endpoint %}active{% endif %}">
        <span><i class="bi {{ item.icon }} me-2"></i> {{ item.label }}</span>
        {% if item.endpoint == 'notifications' and unread_notifications %}
          <span class="badge bg-danger rounded-pill">{{ unread_notifications }}</span>
        {% endif %}
      </a>
    </li>
  {% endfor %}
</ul>
<hr class="text-white-50">
<a href="{{ url_for('logout') }}" class="nav-link text-white">
  <i class="bi bi-box-arrow-right me-2"></i> {{ _('Logout') }}
</a>
