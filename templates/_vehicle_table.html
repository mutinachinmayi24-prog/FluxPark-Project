<div class="section-title">{{ _('Vehicle Details') }}</div>
<div class="table-responsive">
  <table class="table dynamic-table align-middle" id="vehicle-table">
    <thead>
      <tr>
        <th style="width:70px">{{ _('S.No') }}</th>
        <th>{{ _('Vehicle Type') }}</th>
        <th>{{ _('Vehicle Number') }}</th>
        <th style="width:50px"></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="s-no text-center">1</td>
        <td>
          <select name="vehicle_type[]" class="form-select" required>
            <option value="">{{ _('Select type') }}</option>
            {% for vt in vehicle_types %}<option value="{{ vt }}">{{ VEHICLE_TYPE_LABELS.get(vt, vt) }}</option>{% endfor %}
          </select>
        </td>
        <td><input type="text" name="vehicle_number[]" class="form-control text-uppercase" placeholder="e.g. TS09AB1234" required></td>
        <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-trash"></i></button></td>
      </tr>
    </tbody>
  </table>
</div>
<button type="button" class="btn btn-sm btn-outline-brand mb-3" data-add-row="vehicle-table">
  <i class="bi bi-plus-lg me-1"></i> {{ _('Add Vehicle') }}
</button>
