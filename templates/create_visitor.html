<!DOCTYPE html>
<html>
<head>
    <title>Visitor Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Create Visitor Parking Request</h2>

    <form action="/save-visitor" method="POST">

        <div class="mb-3">
            <label>Visitor Name</label>
            <input type="text" name="visitor_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Visitor Phone</label>
            <input type="text" name="visitor_phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Vehicle Type</label>
            <select name="vehicle_type" class="form-control">
                <option>Bike</option>
                <option>Car</option>
                <option>Auto</option>
                <option>Truck</option>
                <option>Camper</option>
                <option>Cycle</option>
                <option>Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Vehicle Number</label>
            <input type="text" name="vehicle_number" class="form-control">
        </div>

        <div class="mb-3">
            <label>Date</label>
            <input type="date" name="visit_date" class="form-control">
        </div>

        <div class="mb-3">
            <label>From Time</label>
            <input type="time" name="from_time" class="form-control">
        </div>

        <div class="mb-3">
            <label>To Time</label>
            <input type="time" name="to_time" class="form-control">
        </div>

        <div class="mb-3">
            <label>Resident Flat</label>
            <input type="text" name="resident_flat" class="form-control">
        </div>

        <button class="btn btn-primary">
            Create Request
        </button>

    </form>

</div>

</body>
</html>
