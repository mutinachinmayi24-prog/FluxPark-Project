<!DOCTYPE html>
<html>
<head>
    <title>FluxPark Login</title>
</head>
<body>

<h1>FluxPark</h1>

<form action="/send-otp" method="POST">

    <input type="radio" name="method" value="email" checked>
    Email

    <input type="radio" name="method" value="phone">
    Phone Number

    <br><br>

    <input
        type="text"
        name="contact"
        placeholder="Enter Email or Phone Number"
        required
    >

    <br><br>

    <button type="submit">
        Send OTP
    </button>

</form>

</body>
</html>
