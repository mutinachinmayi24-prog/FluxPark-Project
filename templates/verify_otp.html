{% extends "base.html" %}
{% block title %}Verify OTP - FluxPark{% endblock %}

{% block content %}
  <h5 class="fw-semibold mb-1">Verify your account</h5>
  <p class="text-muted">We've sent a 6-digit verification code to <strong>{{ masked_contact }}</strong>.</p>

  <form method="POST">
    <div class="mb-4">
      <label for="otp-code" class="form-label">Enter Verification Code</label>
      <input type="text" class="form-control form-control-lg text-center letter-spacing-wide" id="otp-code" name="code"
             inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="------" required autocomplete="one-time-code">
    </div>

    <button type="submit" class="btn btn-brand btn-lg w-100 mb-3">
      <i class="bi bi-shield-check me-1"></i> Verify OTP
    </button>
  </form>

  <form method="POST" action="{{ url_for('resend_otp') }}" class="text-center">
    <button type="submit" class="btn btn-link text-decoration-none">
      <i class="bi bi-arrow-repeat me-1"></i> Resend OTP
    </button>
  </form>

  <div class="text-center mt-2">
    <a href="{{ url_for('signup') }}" class="small text-muted">
      <i class="bi bi-arrow-left"></i> Use a different email or phone number
    </a>
  </div>
{% endblock %}
