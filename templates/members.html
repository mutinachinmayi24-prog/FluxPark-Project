{% extends "base.html" %}

{% block content %}

<h2>Members</h2>

<table class="table table-bordered">

    <thead>

        <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Role</th>
        </tr>

    </thead>

    <tbody>

        {% for member in owners %}

        <tr>

            <td>{{ member.name }}</td>

            <td>{{ member.phone }}</td>

            <td>Owner</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
