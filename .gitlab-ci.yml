stages:
  - lint
  - security
  - test
  - compliance
  - changelog

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG-pip"
  paths:
    - .cache/pip

default:
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt

# ---------------------------------------------------------------------------
# Lint / formatting / type checking
# ---------------------------------------------------------------------------
ruff:
  stage: lint
  script:
    - ruff check .
    - ruff format --check .

flake8:
  stage: lint
  script:
    - flake8 .

pylint:
  stage: lint
  script:
    - pylint adk_engine.py ai_engine.py constants.py database.py helpers.py i18n.py main.py models.py parking_engine.py templating.py webcompat.py routers
  allow_failure: true # tighten as the codebase is brought into compliance

mypy:
  stage: lint
  script:
    - mypy .
  allow_failure: true # tighten as type hints are added

pyupgrade:
  stage: lint
  script:
    # python:3.12-slim has no git binary, so `git ls-files` would silently
    # expand to nothing and the job would "pass" without ever checking a
    # single file -- find -not -path excludes match .gitignore instead.
    - pyupgrade --py311-plus $(find . -name '*.py' -not -path './.git/*' -not -path '*/__pycache__/*' -not -path './instance/*' -not -path './.venv/*' -not -path './venv/*' -not -path './.specify/*')
  allow_failure: true

vulture:
  stage: lint
  script:
    - vulture
  allow_failure: true # dead-code findings are reviewed manually before enforcing

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
bandit:
  stage: security
  script:
    - bandit -c pyproject.toml -r .

semgrep:
  stage: security
  image: semgrep/semgrep
  before_script: [] # this image ships semgrep directly; it has no Python/pip to run the default before_script
  script:
    - semgrep --config .semgrep.yml --config p/python --error .

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: [] # Go binary image with no Python/pip
  script:
    - gitleaks detect --source . --config .gitleaks.toml --no-banner --redact -v

pip-audit:
  stage: security
  script:
    - pip-audit -r requirements.txt
  allow_failure: true # dependency advisories are triaged separately from blocking the pipeline

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------
pytest:
  stage: test
  script:
    - pytest
  coverage: '/TOTAL.+?(\d+(?:\.\d+)?%)/'

# ---------------------------------------------------------------------------
# Compliance
# ---------------------------------------------------------------------------
pip-licenses:
  stage: compliance
  before_script:
    # Scoped to runtime deps only (requirements.txt) -- license compliance
    # cares about what actually ships in the Docker image, not dev tooling.
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt pip-licenses
  script:
    - pip-licenses --fail-on="UNKNOWN;Proprietary License;Commercial License" --partial-match

# ---------------------------------------------------------------------------
# Changelog
# ---------------------------------------------------------------------------
changelog:
  stage: changelog
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  before_script: [] # Rust binary image with no Python/pip
  script:
    - git-cliff -o CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
